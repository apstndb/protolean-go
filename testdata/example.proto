syntax = "proto3";

package testdata;

option go_package = "github.com/apstndb/protoon-go/testdata";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/field_mask.proto";

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1;
  STATUS_INACTIVE = 2;
}

message Person {
  string name = 1;
  int32 age = 2;
  bool active = 3;
  repeated string tags = 4;
  Status status = 5;
}

message Company {
  string name = 1;
  repeated Person employees = 2;
  map<string, string> metadata = 3;
  google.protobuf.Timestamp founded_at = 4;
  google.protobuf.Duration uptime = 5;
}

message Nested {
  string id = 1;
  Nested child = 2;
  repeated Nested children = 3;
}

message WKTTest {
  google.protobuf.Struct attributes = 1;
  google.protobuf.Value value = 2;
  google.protobuf.FieldMask mask = 3;
}

message AllTypes {
  double double_field = 1;
  float float_field = 2;
  int32 int32_field = 3;
  int64 int64_field = 4;
  uint32 uint32_field = 5;
  uint64 uint64_field = 6;
  sint32 sint32_field = 7;
  sint64 sint64_field = 8;
  fixed32 fixed32_field = 9;
  fixed64 fixed64_field = 10;
  sfixed32 sfixed32_field = 11;
  sfixed64 sfixed64_field = 12;
  bool bool_field = 13;
  string string_field = 14;
  bytes bytes_field = 15;
}
